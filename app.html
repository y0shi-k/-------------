<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <title>料理レシピ・食材管理アプリ - Phase 1 (Batch Mode)</title>
  <style>
    @keyframes slideLeft { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-4px); } }
    .animate-slide-left { animation: slideLeft 1.5s infinite; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-top: 1px solid rgba(0,0,0,0.05); }
    [hidden] { display: none !important; }
    .overlay-fade { transition: opacity 0.3s ease, visibility 0.3s ease; }
    .staged-item { border-left: 4px solid #fbbf24; cursor: pointer; transition: all 0.2s; }
    .staged-item:hover { background-color: #fffbeb; transform: translateX(4px); }
    .ai-highlight { animation: highlight 2.5s ease-out; }
    @keyframes highlight { 0% { background-color: #e0e7ff; } 100% { background-color: transparent; } }
    .toast-in { animation: toastSlideIn 0.3s ease forwards; }
    .toast-out { animation: toastSlideOut 0.3s ease forwards; }
    @keyframes toastSlideIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastSlideOut { from { opacity: 1; transform: translateX(-50%) translateY(0); } to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen w-full overflow-x-hidden box-border font-sans relative">

    </div>

  <input type="file" accept="image/*" capture="environment" id="imageScanInput" onchange="handleImageScan(event)" hidden>

  <button id="geminiCopyBtn" onclick="majinCopy()" style="display:none;" class="fixed bottom-24 left-4 z-[70] bg-slate-900 text-white text-[10px] font-black py-2.5 px-5 rounded-full shadow-2xl flex items-center gap-2 hover:scale-105 transition-all border border-slate-700">
    <span class="animate-slide-left text-lg">⬅️</span> GEMINIへ共有
  </button>

  <iframe name="gas" class="hidden"></iframe>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw3w7KY6dZK7w4O3qLOvHGoihRzN_eyqxod1awLCZ5klvTZCOtp9sFg1VEIUFoA1XKMLQ/exec";
    const GEMINI_API_KEY = "";
    const convId = "CONV-RECIPE-P1-FINAL-BATCH-FIX";
    let state = {
      inventory: [],
      shopping: [],
      staging: [],
      currentLoc: 'すべて',
      currentMode: 'A',
      isProcessing: false,
      sortBy: 'limit2',
      editMode: null,
      editId: null
    };

    /* --- Core --- */
    function setStatus(show, label = 'Processing...') {
      const bar = document.getElementById('statusBar');
      const overlay = document.getElementById('processingOverlay');
      const overlayLabel = document.getElementById('overlayStatusLabel');
      state.isProcessing = show;
      if (show) {
        bar.classList.remove('hidden');
        overlayLabel.innerHTML = label;
        overlay.classList.remove('invisible');
        overlay.classList.add('opacity-100');
      } else {
        overlay.classList.remove('opacity-100');
        overlay.classList.add('invisible');
        setTimeout(() => bar.classList.add('hidden'), 500);
      }
      document.querySelectorAll('button, input, select').forEach(el => {
        if (!el.id.includes('geminiCopyBtn')) el.disabled = show;
      });
    }

    function showToast(message, type = 'info') {
      const existing = document.querySelector('.app-toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'app-toast fixed top-6 left-1/2 z-[80] px-6 py-3.5 rounded-2xl shadow-2xl font-black text-sm toast-in max-w-[90%] text-center';
      if (type === 'error') {
        toast.classList.add('bg-rose-500', 'text-white');
      } else if (type === 'success') {
        toast.classList.add('bg-emerald-500', 'text-white');
      } else {
        toast.classList.add('bg-slate-800', 'text-white');
      }
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.classList.remove('toast-in');
        toast.classList.add('toast-out');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    async function executeGAS(payloadCode, label) {
      setStatus(true, label);
      const rid = 'rid_' + Date.now();
      const bytes = new TextEncoder().encode(payloadCode);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      const b64 = btoa(binary).split('+').join('-').split('/').join('_').split('=').join('');

      const f = document.createElement('form');
      f.method = 'POST'; f.action = GAS_URL; f.target = 'gas';
      const i1 = document.createElement('textarea'); i1.name = 'text'; i1.value = b64;
      const i2 = document.createElement('input'); i2.type = 'hidden'; i2.name = 'requestId'; i2.value = rid;
      const i3 = document.createElement('input'); i3.type = 'hidden'; i3.name = 'b64'; i3.value = '1';
      f.append(i1, i2, i3); document.body.append(f); f.submit(); f.remove();

      return new Promise((resolve) => {
        const start = Date.now();
        const poll = () => {
          if (Date.now() - start > 90000) { setStatus(false); resolve({ status: 'error' }); return; }
          let cb = 'cb_' + Date.now();
          window[cb] = (r) => {
            delete window[cb];
            if (r.status === 'pending') { setTimeout(poll, 1500); return; }
            setStatus(false);
            if (r.status === 'completed') {
              try {
                const parsed = (typeof r.url === 'string') ? JSON.parse(r.url) : r.url;
                resolve(parsed);
              } catch(e) {
                resolve({ status: 'error', display: r.url, detail: { raw: r.url } });
              }
            } else { resolve({ status: 'error', display: r.url }); }
          };
          const sc = document.createElement('script');
          sc.src = GAS_URL + '?action=check&requestId=' + rid + '&callback=' + cb + '&t=' + Date.now();
          document.body.append(sc); sc.onload = () => sc.remove();
        };
        setTimeout(poll, 1000);
      });
    }

    /* --- Initialization --- */
    async function handleInit() {
      const payload = `(function(){
        var props = PropertiesService.getUserProperties();
        var ssId = props.getProperty('SS_ID_RECIPE_APP');
        var ss;
        if (ssId) {
          try { ss = SpreadsheetApp.openById(ssId); } catch(e) { ss = null; }
        }
        if (!ss) {
          ss = SpreadsheetApp.create('料理レシピ・食材管理DB');
          props.setProperty('SS_ID_RECIPE_APP', ss.getId());
          var names = ['食材在庫','レシピ集','献立スケジュール','料理履歴','買い物リスト'];
          names.forEach(function(n){ if(!ss.getSheetByName(n)) ss.insertSheet(n); });
          var s1 = ss.getSheetByName('食材在庫');
          s1.appendRow(['ID', '分類', '品名', '数量', '単位', '購入日', '開封日', '表示期限', '実質期限', '保存場所', '状態メモ']);
          s1.setFrozenRows(1);
          var s5 = ss.getSheetByName('買い物リスト');
          s5.appendRow(['リストID', '品名', '必要数量', '単位', 'ステータス', '紐づくレシピ名']);
          s5.setFrozenRows(1);
        }
        
        function f(v) { 
          if(!v && v !== 0) return "";
          if(v instanceof Date) return Utilities.formatDate(v, Session.getScriptTimeZone(), "yyyy-MM-dd");
          return String(v).trim();
        }

        var inv = ss.getSheetByName('食材在庫').getDataRange().getValues();
        var shop = ss.getSheetByName('買い物リスト').getDataRange().getValues();
        
        var inventory = [];
        if (inv.length > 1) {
          for(var i=1; i<inv.length; i++) {
            var r = inv[i];
            if(!r[2]) continue; // 品名がなければスキップ
            inventory.push({
              id: f(r[0]), type: f(r[1]), name: f(r[2]), qty: Number(r[3])||0, unit: f(r[4]),
              buy: f(r[5]), open: f(r[6]), limit1: f(r[7]), limit2: f(r[8]), loc: f(r[9]), memo: f(r[10])
            });
          }
        }

        var shopping = [];
        if (shop.length > 1) {
          for(var j=1; j<shop.length; j++) {
            var rs = shop[j];
            if(!rs[1]) continue;
            shopping.push({ id: f(rs[0]), name: f(rs[1]), qty: Number(rs[2])||0, unit: f(rs[3]), status: f(rs[4]) });
          }
        }

        return { display: '在庫データ読み込み完了', detail: { inventory: inventory, shopping: shopping } };
      })()`;
      const res = await executeGAS(payload, 'データベースと同期中...');
      console.log('Init GAS Response:', res);
      if (res && res.status !== 'error') {
        const inv = (res.detail && res.detail.inventory) ? res.detail.inventory : (res.inventory || []);
        const shop = (res.detail && res.detail.shopping) ? res.detail.shopping : (res.shopping || []);
        state.inventory = Array.isArray(inv) ? inv : [];
        state.shopping = Array.isArray(shop) ? shop : [];
        document.getElementById('initView').classList.add('hidden');
        document.getElementById('bottomNav').classList.remove('hidden');
        switchMode('A');
        console.log('Loaded inventory count:', state.inventory.length, 'shopping count:', state.shopping.length);
      } else {
        showToast('データの読み込みに失敗しました。GASの実行権限を確認してください。', 'error');
      }
    }

    function sortInventory(list) {
      return [...list].sort((a, b) => {
        if (state.sortBy === 'name') return a.name.localeCompare(b.name, 'ja');
        if (state.sortBy === 'buy') {
          if (!a.buy && !b.buy) return 0;
          if (!a.buy) return 1;
          if (!b.buy) return -1;
          return a.buy.localeCompare(b.buy);
        }
        if (!a.limit2 && !b.limit2) return 0;
        if (!a.limit2) return 1;
        if (!b.limit2) return -1;
        return a.limit2.localeCompare(b.limit2);
      });
    }

    /* --- Processing --- */
    
    async function batchPredictAI(quiet = false) {
      const selectedCbs = Array.from(document.querySelectorAll('.staging-cb:checked'));
      if (selectedCbs.length === 0) { if(!quiet) showToast('解析する項目を選択してください。', 'error'); return false; }

      const itemsToAnalyze = selectedCbs.map(cb => {
        const idx = parseInt(cb.dataset.idx);
        return { idx, name: state.staging[idx].name, openDate: state.staging[idx].open || new Date().toISOString().split('T')[0] };
      });
      
      setStatus(true, `AIが ${itemsToAnalyze.length} 件の食材を解析中です...<br><span class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Calculating Shelf Life</span>`);
      
      try {
        const apiKey = GEMINI_API_KEY;
        const prompt = `以下の食材と開封日のリストから、衛生的に美味しく食べられる期限を推測してください。配列形式のJSONのみを返してください。リスト: ${JSON.stringify(itemsToAnalyze.map(i => ({name: i.name, openDate: i.openDate})))} 出力形式: [{"name": "食材名", "limitDate": "YYYY-MM-DD"}]`;

        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
        });
        const data = await res.json();
        const results = JSON.parse(data.candidates[0].content.parts[0].text);
        
        let log = "【AI解析結果】\n";
        results.forEach(resItem => {
          const item = state.staging.find(s => s.name === resItem.name && !s.limit2);
          if (item) {
            item.limit2 = resItem.limitDate;
            item._newAi = true;
            log += `・${item.name} → ${item.limit2}\n`;
          }
        });
        if (!quiet) showToast(`${results.length} 件の期限をAI解析しました`, 'success');
      } catch(e) {
        console.error(e);
        if (!quiet) showToast('AI解析中にエラーが発生しました。', 'error');
      }
      setStatus(false);
      renderList();
      return true;
    }

      const payload = `(function(){
        var items = ${JSON.stringify(state.staging)};
        var ss = SpreadsheetApp.openById(PropertiesService.getUserProperties().getProperty('SS_ID_RECIPE_APP'));
        var s = ss.getSheetByName('食材在庫');
        
        items.forEach(function(d){
          var newId = Utilities.getUuid();
          var row = [newId, d.type || '食材', d.name, d.qty, d.unit, d.buy, d.open, d.limit1, d.limit2, d.loc, ''];
          s.appendRow(row);
        });

        function f(v) { 
          if(!v && v !== 0) return "";
          if(v instanceof Date) return Utilities.formatDate(v, Session.getScriptTimeZone(), "yyyy-MM-dd");
          return String(v).trim();
        }
        var inv = s.getDataRange().getValues();
        var fullList = [];
        for(var i=1; i<inv.length; i++) {
          var r = inv[i];
          if(!r[2]) continue;
          fullList.push({
            id: f(r[0]), type: f(r[1]), name: f(r[2]), qty: Number(r[3])||0, unit: f(r[4]),
            buy: f(r[5]), open: f(r[6]), limit1: f(r[7]), limit2: f(r[8]), loc: f(r[9]), memo: f(r[10])
          });
        }
        return { display: '在庫登録完了', detail: { inventory: fullList, count: items.length } };
      })()`;

      const res = await executeGAS(payload, `データベースに ${state.staging.length} 件を一括登録中...`);
      if (res && res.detail) {
        state.inventory = res.detail.inventory || [];
        state.staging = [];
        showToast(`${res.detail.count} 件の食材を在庫に登録し、同期しました。`, 'success');

            buy: f(r[5]), open: f(r[6]), limit1: f(r[7]), limit2: f(r[8]), loc: f(r[9]), memo: f(r[10])
          });
        }
        return { display: '購入処理完了', detail: { inventory: fullList, purchasedIds: ids } };
      })()`;
      const res = await executeGAS(payload, 'データベースに反映中...');
      if (res && res.detail) {
        state.shopping = (state.shopping || []).filter(i => !res.detail.purchasedIds.includes(i.id));
        state.inventory = res.detail.inventory || [];
        filterByLocation('すべて');
      }
    }

    async function adjustInventoryQty(id, delta) {
      const item = state.inventory.find(i => i.id === id);
      if (!item) return;
      const newQty = Math.max(0, item.qty + delta);
      const payload = `(function(){
        var id = ${JSON.stringify(id)};
        var newQty = ${newQty};
        var ss = SpreadsheetApp.openById(PropertiesService.getUserProperties().getProperty('SS_ID_RECIPE_APP'));
        var s = ss.getSheetByName('食材在庫');
        var data = s.getDataRange().getValues();
        for(var i=1; i<data.length; i++) {
          if(String(data[i][0]) === id) {
            s.getRange(i+1, 4).setValue(newQty);
            break;
          }
        }
        function f(v) { 
          if(!v && v !== 0) return "";
          if(v instanceof Date) return Utilities.formatDate(v, Session.getScriptTimeZone(), "yyyy-MM-dd");
          return String(v).trim();
        }
        var inv = s.getDataRange().getValues();
        var fullList = [];
        for(var i=1; i<inv.length; i++) {
          var r = inv[i];
          if(!r[2]) continue;
          fullList.push({
            id: f(r[0]), type: f(r[1]), name: f(r[2]), qty: Number(r[3])||0, unit: f(r[4]),
            buy: f(r[5]), open: f(r[6]), limit1: f(r[7]), limit2: f(r[8]), loc: f(r[9]), memo: f(r[10])
          });
        }
        return { display: '数量更新完了', detail: { inventory: fullList } };
      })()`;
      const res = await executeGAS(payload, '数量を更新中...');
      if (res && res.detail) {
        state.inventory = res.detail.inventory || [];
        renderList();
      }
    }

    async function handleImageScan(e) {
      const file = e.target.files[0];
      if (!file) { console.log('[ImageScan] no file selected'); return; }
      console.log('[ImageScan] file selected:', file.name, file.type, file.size);
      setStatus(true, '画像をエンコード中...');
      try {
        const { base64Data, mimeType } = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            const dataUrl = ev.target.result;
            const commaIdx = dataUrl.indexOf(',');
            if (commaIdx === -1) { reject(new Error('data URL形式が不正です')); return; }
            const mimeType = dataUrl.substring(5, commaIdx).split(';')[0];
            const base64Data = dataUrl.substring(commaIdx + 1);
            console.log('[ImageScan] encoded, mime:', mimeType, 'base64 length:', base64Data.length);
            resolve({ base64Data, mimeType });
          };
          reader.onerror = () => reject(new Error('FileReaderで読み込みエラーが発生しました'));
          reader.readAsDataURL(file);
        });
        await scanImageWithAI(base64Data, mimeType);
      } catch (err) {
        console.error('[ImageScan] error:', err);
        setStatus(false);
        showToast('画像の処理中にエラーが発生しました。' + (err.message || ''), 'error');
      } finally {
        e.target.value = '';
      }
    }

    async function scanImageWithAI(base64Data, mimeType) {
      console.log('[ImageScan] starting Gemini API call...');
      setStatus(true, 'AIが画像を解析中...<br><span class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Image Recognition</span>');
      const prompt = `あなたは食材管理アシスタントです。与えられた画像（レシートまたは食材パッケージ）から、食材情報のみを抽出してください。

以下のJSON配列形式で出力してください:
[
  {
    "name": "食材名",
    "qty": 数量（数値）,
    "unit": "単位（個、g、ml、パックなど）",
    "limit1": "消費期限または賞味期限（YYYY-MM-DD形式、不明ならnull）",
    "loc": "保存場所（冷蔵庫、冷凍庫、パントリーなど、不明なら冷蔵庫）"
  }
]

注意事項:
- 食材に関する情報のみ抽出し、店舗名・住所・電話番号などの個人情報は含めないでください
- 数量が不明確な場合は1、単位が不明な場合は「個」としてください
- 画像に食材が含まれない場合は空配列 [] を返してください
- JSON配列以外の説明文は一切出力しないでください`;

      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                { text: prompt },
                { inlineData: { mimeType: mimeType, data: base64Data } }
              ]
            }],
            generationConfig: { responseMimeType: "application/json" }
          })
        });
        console.log('[ImageScan] API response status:', res.status);
        if (!res.ok) {
          let errMsg = `APIエラー: ${res.status}`;
          try {
            const errData = await res.json();
            console.error('Gemini API error body:', errData);
            if (errData.error && errData.error.message) errMsg += '\n' + errData.error.message;
          } catch (parseErr) {
            console.error('Failed to parse error response');
          }
          throw new Error(errMsg);
        }
        const data = await res.json();
        console.log('[ImageScan] API response data:', data);
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        console.log('[ImageScan] raw text:', text);
        const items = parseAIImageResponse(text);
        console.log('[ImageScan] parsed items:', items);
        if (items.length === 0) {
          setStatus(false);
          showToast('画像から食材が検出されませんでした。', 'error');
          return;
        }
        const today = new Date().toISOString().split('T')[0];
        items.forEach(item => {
          state.staging.push({
            name: item.name || '不明な食材',
            type: '食材',
            qty: typeof item.qty === 'number' ? item.qty : (parseFloat(item.qty) || 1),
            unit: item.unit || '個',
            buy: today,
            open: '',
            limit1: item.limit1 && item.limit1 !== 'null' ? item.limit1 : '',
            limit2: null,
            loc: item.loc || '冷蔵庫',
            memo: '画像スキャンから追加',
            _newAi: true
          });
        });
        setStatus(false);
        renderList();
        showToast(`${items.length} 件の食材を登録待ちリストに追加しました。内容を確認・修正してください。`, 'success');
      } catch (err) {
        console.error('[ImageScan] scan error:', err);
        setStatus(false);
        showToast('画像の解析中にエラーが発生しました。' + (err.message || ''), 'error');
      }
    }

    function parseAIImageResponse(text) {
      try {
        const parsed = JSON.parse(text);
        if (Array.isArray(parsed)) return parsed;
        if (parsed && Array.isArray(parsed.items)) return parsed.items;
        return [];
      } catch (e) {
        console.error('JSON parse error:', e, 'Raw text:', text);
        return [];
      }
    }

    function majinCopy() {
      const data = { inventory: state.inventory, staging: state.staging };
      const t = document.createElement('textarea');
      t.value = "【Majin Agent 実行結果】\nID: " + convId + "\n---\n" + JSON.stringify(data, null, 2) + "\n---";
      document.body.append(t); t.select(); document.execCommand('copy'); t.remove();
      showToast('システム状況をコピーしました。Geminiのチャット欄に貼り付けて共有してください。', 'success');
    }
  </script>
